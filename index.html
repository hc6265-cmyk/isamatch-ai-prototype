<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이사매치 AI — 부동산 중개사용 AI CRM·광고 플랫폼</title>
<style>
  :root{
    --blue:#0b5fff; --blue-dark:#0a3fb8; --blue-light:#eaf1ff;
    --green:#16a34a; --green-light:#e8f7ee;
    --orange:#f59e0b; --orange-light:#fef3e2;
    --red:#ef4444; --red-light:#fde9e9;
    --gray:#6b7280; --gray-light:#f3f4f6; --border:#e5e7eb;
    --text:#111827; --text-soft:#4b5563;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Pretendard,-apple-system,sans-serif;background:#f5f6fa;color:var(--text);}
  .app{display:flex;min-height:100vh;}
  /* Sidebar */
  .sidebar{width:230px;background:#0d1726;color:#fff;flex-shrink:0;display:flex;flex-direction:column;padding:20px 0;}
  .brand{padding:0 20px 20px;font-weight:800;font-size:18px;border-bottom:1px solid #1f2c40;display:flex;align-items:center;gap:8px;}
  .brand span.tag{font-size:10px;background:var(--blue);padding:2px 6px;border-radius:6px;font-weight:600;}
  .nav{margin-top:10px;display:flex;flex-direction:column;gap:2px;}
  .nav button{all:unset;cursor:pointer;color:#c4cdda;padding:12px 20px;font-size:14px;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;}
  .nav button:hover{background:#16213a;color:#fff;}
  .nav button.active{background:#16213a;color:#fff;border-left-color:var(--blue);font-weight:600;}
  .nav .icon{width:18px;text-align:center;}
  .sidebar-foot{margin-top:auto;padding:16px 20px;font-size:11px;color:#5c6b85;border-top:1px solid #1f2c40;}

  /* Main */
  .main{flex:1;padding:28px 36px;overflow-x:hidden;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .topbar h1{font-size:22px;margin:0;}
  .topbar .sub{color:var(--gray);font-size:13px;margin-top:4px;}
  .pill{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
  .pill.blue{background:var(--blue-light);color:var(--blue);}
  .pill.green{background:var(--green-light);color:var(--green);}
  .pill.orange{background:var(--orange-light);color:#b45309;}
  .pill.red{background:var(--red-light);color:var(--red);}

  .grid{display:grid;gap:18px;}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .grid.cols-2{grid-template-columns:repeat(2,1fr);}

  .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
  .card h3{margin:0 0 6px;font-size:14px;color:var(--gray);font-weight:600;}
  .card .big{font-size:26px;font-weight:800;}
  .card .delta{font-size:12px;font-weight:600;}
  .delta.up{color:var(--green);}
  .delta.down{color:var(--red);}

  .section{margin-top:26px;}
  .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .section-head h2{font-size:16px;margin:0;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
  th{color:var(--gray);font-weight:600;background:#fafbfc;}
  tr:hover td{background:#fafcff;}

  .btn{all:unset;cursor:pointer;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
  .btn.primary{background:var(--blue);color:#fff;}
  .btn.primary:hover{background:var(--blue-dark);}
  .btn.secondary{background:var(--gray-light);color:var(--text);}
  .btn.secondary:hover{background:#e8e9ed;}
  .btn.ghost{background:transparent;color:var(--blue);border:1px solid var(--blue-light);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
  .badge.high{background:var(--red-light);color:var(--red);}
  .badge.mid{background:var(--orange-light);color:#b45309;}
  .badge.low{background:var(--gray-light);color:var(--gray);}

  .score-bar{width:80px;height:6px;background:#eee;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px;}
  .score-bar > div{height:100%;background:linear-gradient(90deg,var(--blue),#5b9aff);}

  .checkbox-row{display:flex;align-items:center;gap:8px;}

  .stepper{display:flex;gap:0;margin-bottom:24px;}
  .step{flex:1;text-align:center;padding:10px 0;border-bottom:3px solid var(--border);color:var(--gray);font-size:13px;font-weight:600;position:relative;}
  .step.active{color:var(--blue);border-bottom-color:var(--blue);}
  .step.done{color:var(--green);border-bottom-color:var(--green);}

  .flow-box{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;}

  .seg-card{border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:.15s;background:#fff;}
  .seg-card:hover{border-color:var(--blue);box-shadow:0 2px 10px rgba(11,95,255,.08);}
  .seg-card.selected{border-color:var(--blue);background:var(--blue-light);}
  .seg-card .seg-title{font-weight:700;font-size:14px;margin-bottom:4px;}
  .seg-card .seg-count{font-size:24px;font-weight:800;color:var(--blue);}
  .seg-card .seg-desc{font-size:12px;color:var(--gray);margin-top:6px;line-height:1.5;}

  .msg-preview{background:#f8f9fb;border:1px solid var(--border);border-radius:14px;padding:16px;font-size:13px;line-height:1.6;position:relative;}
  .msg-preview .sender{font-size:11px;color:var(--gray);margin-bottom:6px;}
  .phone-frame{max-width:300px;margin:0 auto;border:8px solid #1f2937;border-radius:28px;padding:14px;background:#000;}
  .phone-screen{background:#fff;border-radius:18px;padding:14px;min-height:200px;}

  .toggle{display:flex;align-items:center;gap:8px;font-size:13px;}
  .switch{width:38px;height:20px;border-radius:20px;background:var(--border);position:relative;cursor:pointer;transition:.2s;}
  .switch.on{background:var(--blue);}
  .switch .knob{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s;}
  .switch.on .knob{left:20px;}

  .privacy-note{display:flex;gap:10px;background:var(--blue-light);border:1px solid #cfe0ff;border-radius:10px;padding:12px 14px;font-size:12px;color:#1d4ed8;margin-top:14px;}
  .privacy-note .ic{font-size:16px;}

  .flow-diagram{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:18px 0;}
  .flow-node{flex:1;text-align:center;background:#fafbfc;border:1px dashed var(--border);border-radius:10px;padding:14px 8px;font-size:12px;color:var(--text-soft);}
  .flow-node b{display:block;font-size:13px;color:var(--text);margin-bottom:4px;}
  .flow-arrow{color:var(--gray);font-size:18px;}

  .toast{position:fixed;bottom:28px;right:28px;background:#111827;color:#fff;padding:14px 20px;border-radius:10px;font-size:13px;box-shadow:0 6px 24px rgba(0,0,0,.2);opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}

  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:998;}
  .modal-overlay.show{display:flex;}
  .modal{background:#fff;border-radius:16px;padding:26px;width:420px;max-width:90vw;}
  .modal h3{margin-top:0;}
  .modal-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border);}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}

  .funnel-bar{display:flex;height:34px;border-radius:8px;overflow:hidden;font-size:11px;color:#fff;}
  .funnel-bar div{display:flex;align-items:center;justify-content:center;}

  .legend{display:flex;gap:14px;font-size:12px;color:var(--gray);margin-top:8px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}

  .empty-hint{color:var(--gray);font-size:13px;text-align:center;padding:30px 0;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">🏠 이사매치 <span class="tag">AI</span></div>
    <div class="nav" id="nav">
      <button data-page="dashboard" class="active"><span class="icon">📊</span> 대시보드</button>
      <button data-page="target"><span class="icon">🎯</span> AI 타겟 추출</button>
      <button data-page="message"><span class="icon">✍️</span> 광고문구 생성</button>
      <button data-page="send"><span class="icon">📤</span> AI 자동 발송</button>
      <button data-page="result"><span class="icon">📈</span> 결과·피드백</button>
      <button data-page="privacy"><span class="icon">🔒</span> 데이터·동의 구조</button>
    </div>
    <div class="sidebar-foot">테스트 계정: 강남웰빙공인중개사<br>SKT 에이닷전화 연동중</div>
  </div>

  <div class="main" id="main"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* ===================== Mock Data ===================== */
const segments = [
  {
    id:'lease', title:'전세만기 임박형', icon:'⏰', count:128, score:92,
    desc:'전세 만기 60일 이내 + 최근 부동산앱 사용 흔적 보유. 가장 전환 가능성이 높은 핵심 타겟.',
    signals:['중개망 CRM: 전세만기 D-45 이내','앱사용 이력: 최근 7일 내 부동산앱 사용'],
    sample:'전세 만기 다가오시죠? 15년차 지역 전문 중개사가 직접 상담드립니다.',
    color:'#ef4444'
  },
  {
    id:'call', title:'통화이력 보유형', icon:'📞', count:64, score:78,
    desc:'에이닷전화 비즈연락처로 최근 1개월 내 사무소에 전화 문의한 적 있는 고객.',
    signals:['통화이력: 최근 30일 내 사무소 발신/수신 통화'],
    sample:'문의 감사합니다. 역삼동·대치동 아파트 전문 중개사가 직접 안내드립니다.',
    color:'#f59e0b'
  },
  {
    id:'app', title:'앱탐색형 (관심)', icon:'📱', count:241, score:54,
    desc:'네이버부동산 등 부동산 전용 앱을 최근 1개월 내 사용한 SKT 광고 동의 회원.',
    signals:['앱사용 이력: 최근 30일 내 부동산앱 사용','중개사 직접 통화/상담 이력 없음'],
    sample:'관심 지역 매물 보고 계셨죠? 강남구 부동산협회 부회장이 직접 안내드립니다.',
    color:'#3b82f6'
  },
];

const COST_PER_SEND = 200; // 발송건당 과금 (원)

const districts = [
  { gu:'강남구', dongs:[
    {name:'역삼동', weight:0.18}, {name:'대치동', weight:0.15},
    {name:'삼성동', weight:0.10}, {name:'논현동', weight:0.08},
  ]},
  { gu:'서초구', dongs:[
    {name:'서초동', weight:0.12}, {name:'반포동', weight:0.10}, {name:'잠원동', weight:0.07},
  ]},
  { gu:'송파구', dongs:[
    {name:'잠실동', weight:0.12}, {name:'문정동', weight:0.08},
  ]},
];
const allDongNames = districts.flatMap(d=>d.dongs.map(x=>x.name));

/* 신호 보유 조합별 고객 분포 (Venn 버킷). CRM/통화이력/앱사용이력 3개 신호의 AND/OR 조합 계산용 */
const signalBuckets = [
  { crm:true,  call:false, app:false, count:50  },
  { crm:false, call:true,  app:false, count:40  },
  { crm:false, call:false, app:true,  count:200 },
  { crm:true,  call:true,  app:false, count:30  },
  { crm:true,  call:false, app:true,  count:25  },
  { crm:false, call:true,  app:true,  count:15  },
  { crm:true,  call:true,  app:true,  count:73  },
];
const signalLabels = { crm:'중개망 CRM 신호', call:'통화이력', app:'앱사용이력' };

let state = {
  selectedSegments: [],
  selectedDongs: [...allDongNames], // 기본값: 전체 지역 (제한 없음)
  customSegments: [],
  builder: { crm:true, call:true, app:false, logic:'AND' },
  office: {
    location: '서울 강남구 역삼동',
    years: '15',
    specialty: '역삼동·대치동 일대 아파트(대치미도, 역삼래미안 등)',
    career: '前 법무법인 등기팀 5년 근무 · 강남구 공인중개사협회 부회장',
    staffSize: '대표 포함 4인(중개보조원 2인, 행정직원 1인)',
    strength: '등기·세금 상담 원스톱 처리, 매물 직접 임장 후 영상 안내'
  },
  generatedMsgs: {},
  budget: 150000,
  sentCampaigns: [
    {id:1, date:'2026-06-18', segment:'전세만기 임박형', sent:96, clickRate:18, replyRate:9, cost:96*COST_PER_SEND, status:'완료'},
    {id:2, date:'2026-06-12', segment:'통화이력 보유형', sent:52, clickRate:31, replyRate:12, cost:52*COST_PER_SEND, status:'완료'},
    {id:3, date:'2026-06-05', segment:'앱탐색형 (관심)', sent:180, clickRate:7, replyRate:2, cost:180*COST_PER_SEND, status:'완료'},
  ]
};

function regionRatio(){
  if(state.selectedDongs.length === allDongNames.length) return 1;
  let ratio = 0;
  districts.forEach(d=>d.dongs.forEach(x=>{ if(state.selectedDongs.includes(x.name)) ratio += x.weight; }));
  return ratio;
}
function getFilteredCount(seg){
  return Math.max(0, Math.round(seg.count * regionRatio()));
}
function getAllSegments(){
  return [...segments, ...state.customSegments];
}
function builderSelectedKeys(){
  return ['crm','call','app'].filter(k=>state.builder[k]);
}
function computeBuilderBaseCount(){
  const sel = builderSelectedKeys();
  if(sel.length===0) return 0;
  return signalBuckets.reduce((sum,b)=>{
    const matches = state.builder.logic==='AND' ? sel.every(s=>b[s]) : sel.some(s=>b[s]);
    return matches ? sum+b.count : sum;
  },0);
}
function regionLabel(){
  return regionRatio()===1 ? '전체 지역' : (state.selectedDongs.length? state.selectedDongs.join(', ') : '선택된 지역 없음');
}
function builderConditionText(){
  const sel = builderSelectedKeys();
  if(sel.length===0) return '신호를 1개 이상 선택해주세요';
  const sigText = sel.map(s=>signalLabels[s]).join(state.builder.logic==='AND' ? ' AND ' : ' OR ');
  return `(${sigText}) AND [${regionLabel()} 거주고객]`;
}

/* ===================== Router ===================== */
const pages = {};
function render(page){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  document.getElementById('main').innerHTML = pages[page]();
  attachHandlers(page);
}
document.getElementById('nav').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  render(btn.dataset.page);
});

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ===================== Dashboard ===================== */
pages.dashboard = () => `
  <div class="topbar">
    <div>
      <h1>대시보드</h1>
      <div class="sub">강남웰빙공인중개사 · 2026.06.22 기준</div>
    </div>
    <span class="pill blue">에이닷전화 연동 정상</span>
  </div>

  <div class="grid cols-4">
    <div class="card"><h3>이번달 발굴된 타겟</h3><div class="big">433명</div><div class="delta up">▲ 전월 대비 12%</div></div>
    <div class="card"><h3>발송 캠페인</h3><div class="big">3건</div><div class="delta up">완료 3 · 진행중 0</div></div>
    <div class="card"><h3>평균 회신율</h3><div class="big">7.7%</div><div class="delta up">▲ 1.4%p</div></div>
    <div class="card"><h3>이번달 광고비</h3><div class="big">${state.sentCampaigns.reduce((a,c)=>a+c.cost,0).toLocaleString()}원</div><div class="delta down">발송건당 200원 과금</div></div>
  </div>

  <div class="section">
    <div class="section-head"><h2>🎯 오늘의 추천 액션</h2></div>
    <div class="grid cols-3">
      <div class="card" style="border-left:4px solid #ef4444;">
        <h3>전세만기 임박형 타겟 128명</h3>
        <p style="font-size:13px;color:var(--text-soft);">신규 발굴된 고스코어 타겟이 있습니다. 지금 캠페인을 만들어보세요.</p>
        <button class="btn primary" onclick="render('target')">타겟 추출하기 →</button>
      </div>
      <div class="card" style="border-left:4px solid #16a34a;">
        <h3>지난 캠페인 학습 완료</h3>
        <p style="font-size:13px;color:var(--text-soft);">"전세 만기" 키워드 포함 문구의 클릭률이 평균보다 2.3배 높았습니다.</p>
        <button class="btn ghost" onclick="render('result')">결과 보기 →</button>
      </div>
      <div class="card" style="border-left:4px solid #f59e0b;">
        <h3>동의 미확보 고객 18명</h3>
        <p style="font-size:13px;color:var(--text-soft);">통신데이터 활용 동의가 없어 타겟에서 자동 제외되었습니다.</p>
        <button class="btn ghost" onclick="render('privacy')">동의 구조 확인 →</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-head"><h2>최근 캠페인</h2></div>
    <div class="card" style="padding:0;">
      <table>
        <thead><tr><th>일자</th><th>세그먼트</th><th>발송수</th><th>클릭률</th><th>회신율</th><th>비용</th><th>상태</th></tr></thead>
        <tbody>
          ${state.sentCampaigns.map(c=>`
            <tr>
              <td>${c.date}</td><td>${c.segment}</td><td>${c.sent}명</td>
              <td>${c.clickRate}%</td><td>${c.replyRate}%</td><td>${c.cost.toLocaleString()}원</td>
              <td><span class="pill green">${c.status}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>
`;

/* ===================== Target Extraction ===================== */
pages.target = () => `
  <div class="topbar">
    <div><h1>AI 타겟 추출</h1><div class="sub">통화 이력 + 앱사용 이력 + CRM 신호를 결합해 거래 임박 스코어를 산출합니다.</div></div>
  </div>

  <div class="flow-diagram">
    <div class="flow-node"><b>📋 중개망 CRM</b>전세만기·구입예상 신호</div>
    <div class="flow-arrow">＋</div>
    <div class="flow-node"><b>📞 통화 이력</b>최근 1개월 사무소 발신/수신</div>

/* ===================== Handlers ===================== */
function attachHandlers(page){
  if(page==='target'){
    document.querySelectorAll('.seg-card').forEach(card=>{
      card.addEventListener('click', (e)=>{
        if(e.target.closest('input')) return;
        const id = card.dataset.seg;
        const idx = state.selectedSegments.indexOf(id);
        if(idx>-1) state.selectedSegments.splice(idx,1);
        else state.selectedSegments.push(id);
        render('target');
      });
    });
    document.querySelectorAll('.dongCheck').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const name = cb.dataset.dong;
        const idx = state.selectedDongs.indexOf(name);
        if(cb.checked && idx===-1) state.selectedDongs.push(name);
        if(!cb.checked && idx>-1) state.selectedDongs.splice(idx,1);
        render('target');
      });
    });
    document.querySelectorAll('.guCheck').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const gu = districts.find(d=>d.gu===cb.dataset.gu);
        gu.dongs.forEach(x=>{
          const idx = state.selectedDongs.indexOf(x.name);
          if(cb.checked && idx===-1) state.selectedDongs.push(x.name);
          if(!cb.checked && idx>-1) state.selectedDongs.splice(idx,1);
        });
        render('target');
      });
    });
    const selAll = document.getElementById('selectAllDongBtn');
    if(selAll) selAll.addEventListener('click', ()=>{ state.selectedDongs=[...allDongNames]; render('target'); });
    const clrAll = document.getElementById('clearDongBtn');
    if(clrAll) clrAll.addEventListener('click', ()=>{ state.selectedDongs=[]; render('target'); });

    document.querySelectorAll('.sigCheck').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        state.builder[cb.dataset.sig] = cb.checked;
        render('target');
      });
    });
    document.querySelectorAll('.logicBtn').forEach(b=>{
      b.addEventListener('click', ()=>{
        state.builder.logic = b.dataset.logic;
        render('target');
      });
    });
    const addBtn = document.getElementById('addCustomSegBtn');
    if(addBtn) addBtn.addEventListener('click', ()=>{
      const sel = builderSelectedKeys();
      if(sel.length===0) return;
      const base = computeBuilderBaseCount();
      const sigText = sel.map(s=>signalLabels[s]).join(state.builder.logic==='AND' ? ' AND ' : ' OR ');
      const seg = {
        id: 'custom_'+Date.now(),
        title: `${sigText} (${regionLabel()})`,
        icon: '🧩',
        count: base,
        score: state.builder.logic==='AND' ? Math.min(95, 65+sel.length*8) : Math.min(80, 50+sel.length*6),
        desc: `커스텀 조건으로 추출된 세그먼트: ${builderConditionText()}`,
        signals: sel.map(s=>signalLabels[s]),
        custom: true
      };
      state.customSegments.unshift(seg);
      state.selectedSegments.push(seg.id);
      render('target');
      toast('🧩 조건에 맞는 커스텀 세그먼트가 추가되었습니다.');
    });
    document.querySelectorAll('.delCustomBtn').forEach(b=>{
      b.addEventListener('click', (e)=>{
        e.stopPropagation();
        const id = b.dataset.seg;
        state.customSegments = state.customSegments.filter(s=>s.id!==id);
        state.selectedSegments = state.selectedSegments.filter(sid=>sid!==id);
        render('target');
      });
    });
  }
  if(page==='message'){
    const genBtn = document.getElementById('genBtn');
    if(genBtn) genBtn.addEventListener('click', ()=>{
      state.office = {
        location: document.getElementById('o_location').value,
        years: document.getElementById('o_years').value,
        specialty: document.getElementById('o_specialty').value,
        career: document.getElementById('o_career').value,
        staffSize: document.getElementById('o_staffSize').value,
        strength: document.getElementById('o_strength').value,
      };
      state.selectedSegments.forEach(id=>generateMsg(id));
      render('message');
      toast('✨ AI가 세그먼트별 광고문구를 생성했습니다.');
    });
    document.querySelectorAll('.regenBtn').forEach(b=>{
      b.addEventListener('click', ()=>{
        generateMsg(b.dataset.seg, true);
        render('message');
        toast('🔄 새 문구를 생성했습니다.');
      });
    });
  }
  if(page==='send'){
    const range = document.getElementById('budgetRange');
    if(range) range.addEventListener('input', ()=>{
      state.budget = parseInt(range.value);
      document.getElementById('budgetVal').textContent = state.budget.toLocaleString();
    });
    const approveBtn = document.getElementById('approveBtn');
    if(approveBtn) approveBtn.addEventListener('click', openApproveModal);
  }
  if(page==='privacy'){
    ['consent1','consent2'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.addEventListener('click', ()=>el.classList.toggle('on'));
    });
  }
}

function generateMsg(segId, random){
  const tpls = msgTemplates[segId] || msgTemplates.default;
  const tpl = random ? tpls[Math.floor(Math.random()*tpls.length)] : tpls[0];
  const o = state.office;
  state.generatedMsgs[segId] = tpl
    .replace(/{location}/g,o.location).replace(/{years}/g,o.years)
    .replace(/{specialty}/g,o.specialty).replace(/{career}/g,o.career)
    .replace(/{staffSize}/g,o.staffSize).replace(/{strength}/g,o.strength);
}

function openApproveModal(){
  const chosen = getAllSegments().filter(s=>state.selectedSegments.includes(s.id));
  const totalCount = chosen.reduce((a,s)=>a+getFilteredCount(s),0);
  const excluded = Math.round(totalCount*0.04);
  const finalCount = totalCount-excluded;
  const estCost = finalCount*COST_PER_SEND;
  document.getElementById('modalBody').innerHTML = `
    <h3>📤 발송 승인 요청</h3>
    <div class="modal-row"><span>대상 세그먼트</span><b>${chosen.map(c=>c.title).join(', ')}</b></div>
    <div class="modal-row"><span>발송 지역</span><b style="text-align:right;max-width:240px;">${regionRatio()===1?'전체 지역':(state.selectedDongs.join(', ')||'선택된 지역 없음')}</b></div>
    <div class="modal-row"><span>최종 발송 대상</span><b>${finalCount}명</b></div>
    <div class="modal-row"><span>발송 단가</span><b>건당 ${COST_PER_SEND}원</b></div>
    <div class="modal-row"><span>예상 비용</span><b>${estCost.toLocaleString()}원</b></div>
    <div class="modal-row"><span>설정 예산</span><b style="color:${estCost>state.budget?'var(--red)':'var(--green)'}">${state.budget.toLocaleString()}원</b></div>
    <div class="modal-row" style="border-bottom:none;"><span>발송 예정 시간대</span><b>평일 11:00~13:00</b></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">취소</button>
      <button class="btn primary" ${finalCount===0?'disabled':''} onclick="confirmSend(${finalCount}, ${estCost})">승인하고 발송</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }
function confirmSend(count, cost){
  closeModal();
  state.sentCampaigns.unshift({
    id: Date.now(), date:'2026-06-22',
    segment: getAllSegments().filter(s=>state.selectedSegments.includes(s.id)).map(s=>s.title).join(', '),
    sent: count, clickRate: Math.floor(Math.random()*15)+10, replyRate: Math.floor(Math.random()*8)+3,
    cost, status:'발송완료'
  });
  toast(`✅ ${count}명에게 발송이 완료되었습니다.`);
  render('dashboard');
}

/* init */
render('dashboard');
</script>
